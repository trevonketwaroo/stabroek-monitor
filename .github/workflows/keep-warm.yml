name: Keep warm

# Render's free tier sleeps after ~15 min idle; a periodic ping keeps the
# dashboard fast for anyone clicking through from a CV or profile.
on:
  schedule:
    - cron: '*/10 10-23 * * *' # every 10 min, 6am-7pm Guyana time
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: curl -sf https://stabroek-monitor.onrender.com/api/health
