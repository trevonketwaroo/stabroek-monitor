name: Collect market data

on:
  schedule:
    - cron: '17 10 * * *' # daily, 10:17 UTC (~6:17am Guyana)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node collector/collect.js
      - name: Commit if changed
        run: |
          git config user.name "stabroek-monitor-bot"
          git config user.email "actions@github.com"
          git add data/brent.json
          git diff --cached --quiet || git commit -m "data: daily Brent update"
          git push
